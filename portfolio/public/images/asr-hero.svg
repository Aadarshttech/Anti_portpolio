<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="400" cy="250" r="180" fill="url(#circle1)"/>
  <circle cx="400" cy="250" r="120" stroke="#10b981" stroke-opacity="0.08" stroke-width="1" fill="none"/>
  <circle cx="400" cy="250" r="200" stroke="#10b981" stroke-opacity="0.05" stroke-width="1" fill="none"/>
  
  <!-- Grid dots pattern -->
  <g opacity="0.06">
    <circle cx="100" cy="100" r="2" fill="#10b981"/>
    <circle cx="150" cy="100" r="2" fill="#10b981"/>
    <circle cx="200" cy="100" r="2" fill="#10b981"/>
    <circle cx="250" cy="100" r="2" fill="#10b981"/>
    <circle cx="300" cy="100" r="2" fill="#10b981"/>
    <circle cx="100" cy="150" r="2" fill="#10b981"/>
    <circle cx="150" cy="150" r="2" fill="#10b981"/>
    <circle cx="200" cy="150" r="2" fill="#10b981"/>
    <circle cx="600" cy="350" r="2" fill="#10b981"/>
    <circle cx="650" cy="350" r="2" fill="#10b981"/>
    <circle cx="700" cy="350" r="2" fill="#10b981"/>
    <circle cx="600" cy="400" r="2" fill="#10b981"/>
    <circle cx="650" cy="400" r="2" fill="#10b981"/>
    <circle cx="700" cy="400" r="2" fill="#10b981"/>
  </g>
  
  <!-- Audio waveform bars (center) -->
  <g filter="url(#glow)" transform="translate(400, 250)">
    <rect x="-140" y="-20" width="5" height="40" rx="2.5" fill="url(#wave1)" opacity="0.5"/>
    <rect x="-125" y="-35" width="5" height="70" rx="2.5" fill="url(#wave1)" opacity="0.6"/>
    <rect x="-110" y="-55" width="5" height="110" rx="2.5" fill="url(#wave1)" opacity="0.7"/>
    <rect x="-95" y="-40" width="5" height="80" rx="2.5" fill="url(#wave1)" opacity="0.8"/>
    <rect x="-80" y="-70" width="5" height="140" rx="2.5" fill="url(#wave1)" opacity="0.9"/>
    <rect x="-65" y="-45" width="5" height="90" rx="2.5" fill="url(#wave1)"/>
    <rect x="-50" y="-80" width="5" height="160" rx="2.5" fill="url(#wave1)"/>
    <rect x="-35" y="-55" width="5" height="110" rx="2.5" fill="url(#wave1)" opacity="0.95"/>
    <rect x="-20" y="-90" width="5" height="180" rx="2.5" fill="url(#wave1)"/>
    <rect x="-5" y="-60" width="5" height="120" rx="2.5" fill="url(#wave1)"/>
    <rect x="10" y="-95" width="5" height="190" rx="2.5" fill="url(#wave1)"/>
    <rect x="25" y="-65" width="5" height="130" rx="2.5" fill="url(#wave1)" opacity="0.95"/>
    <rect x="40" y="-85" width="5" height="170" rx="2.5" fill="url(#wave1)"/>
    <rect x="55" y="-50" width="5" height="100" rx="2.5" fill="url(#wave1)"/>
    <rect x="70" y="-75" width="5" height="150" rx="2.5" fill="url(#wave1)" opacity="0.9"/>
    <rect x="85" y="-45" width="5" height="90" rx="2.5" fill="url(#wave1)" opacity="0.8"/>
    <rect x="100" y="-60" width="5" height="120" rx="2.5" fill="url(#wave1)" opacity="0.7"/>
    <rect x="115" y="-35" width="5" height="70" rx="2.5" fill="url(#wave1)" opacity="0.6"/>
    <rect x="130" y="-25" width="5" height="50" rx="2.5" fill="url(#wave1)" opacity="0.5"/>
  </g>
  
  <!-- Microphone icon -->
  <g transform="translate(400, 120)" filter="url(#softGlow)">
    <rect x="-12" y="-30" width="24" height="38" rx="12" stroke="#34d399" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M-20 10 Q-20 32 0 32 Q20 32 20 10" stroke="#34d399" stroke-width="2" fill="none" opacity="0.6"/>
    <line x1="0" y1="32" x2="0" y2="44" stroke="#34d399" stroke-width="2" opacity="0.6"/>
    <line x1="-10" y1="44" x2="10" y2="44" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- "नेपाली" text (Nepali in Devanagari) -->
  <text x="400" y="410" text-anchor="middle" fill="url(#textGrad)" font-family="sans-serif" font-size="28" font-weight="bold" letter-spacing="4" opacity="0.7">नेपाली ASR</text>
  <text x="400" y="440" text-anchor="middle" fill="#6ee7b7" font-family="sans-serif" font-size="13" font-weight="500" letter-spacing="6" opacity="0.35" text-transform="uppercase">REWARD-GUIDED FINETUNING</text>
  
  <!-- Arrow flow: speech → text -->
  <g opacity="0.3">
    <path d="M200 250 Q300 250 300 200" stroke="#10b981" stroke-width="1" fill="none" stroke-dasharray="4 4"/>
    <path d="M500 200 Q500 250 600 250" stroke="#10b981" stroke-width="1" fill="none" stroke-dasharray="4 4"/>
  </g>
</svg>